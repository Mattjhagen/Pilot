name: Pilot
options:
  bundleIdPrefix: com.pilot
  deploymentTarget:
    iOS: 17.0
targets:
  Pilot:
    type: application
    platform: iOS
    sources: 
      - Sources
      - Localizable.strings
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  PilotTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests/PilotTests]
    dependencies:
      - target: Pilot
